name: Factory market catalog

on:
  schedule:
    - cron: '17 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: factory-market-catalog
  cancel-in-progress: false

jobs:
  refresh:
    if: github.repository == 'ggmatch-mod/open-pendle'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - name: Index recognized Pendle factories
        env:
          # Keep credential-bearing RPC URLs out of dependency lifecycle steps.
          ETHEREUM_RPC_URL: ${{ secrets.ETHEREUM_RPC_URL }}
          BSC_RPC_URL: ${{ secrets.BSC_RPC_URL }}
          MONAD_RPC_URL: ${{ secrets.MONAD_RPC_URL }}
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
          PLASMA_RPC_URL: ${{ secrets.PLASMA_RPC_URL }}
          ARBITRUM_RPC_URL: ${{ secrets.ARBITRUM_RPC_URL }}
          BSC_LOG_API_URL: ${{ secrets.BSC_LOG_API_URL }}
          MONAD_LOG_API_URL: ${{ secrets.MONAD_LOG_API_URL }}
        run: npm run index:factory-markets
      - name: Validate deterministic snapshot
        run: npm run check:factory-markets:complete
      - name: Publish changed snapshot
        working-directory: .
        shell: bash
        run: |
          if git diff --quiet -- app/public/catalog/factory-markets.v1.json; then
            echo "Factory catalog is already current."
            exit 0
          fi
          git config user.name "openpendle-catalog[bot]"
          git config user.email "openpendle-catalog[bot]@users.noreply.github.com"
          git add app/public/catalog/factory-markets.v1.json
          git commit -m "data: refresh factory market catalog"
          git push origin HEAD:main
