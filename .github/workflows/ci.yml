name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run check:alerts
      - run: npm run check:limit-orders
      - run: npm run check:looping
      - run: npm run check:looping-adjustment-math
      - run: npm run check:looping-execution
      - run: npm run check:looping-pending
      - run: npm run check:looping-rpc-beta
      - run: npm run check:looping-mint-runtime-policy
      - run: npm run check:looping-ui-safety
      - run: npm run check:looping-live-canary
      - run: npm run check:looping-markets
      - run: npm run check:startup
      - run: npm run check:wallet-storage
      - run: npm run check:catalog
      - run: npm run check:factory-markets:complete
      - run: npm run check:m12
      - run: npm run check:positions
      - run: npm run build

  docs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs-site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs-site/package-lock.json
      - run: npm ci
      - run: npm run docs:build

  fork-tests:
    runs-on: ubuntu-latest
    # Public-RPC fork tests can be flaky; failures here block merge but can be re-run.
    env:
      OPENPENDLE_ARB_RPC_URL: ${{ secrets.ARB_RPC_URL != '' && secrets.ARB_RPC_URL || 'https://arb1.arbitrum.io/rpc' }}
      OPENPENDLE_ETH_RPC_URL: ${{ secrets.ETH_RPC_URL != '' && secrets.ETH_RPC_URL || 'https://ethereum-rpc.publicnode.com' }}
      OPENPENDLE_MONAD_RPC_URL: ${{ secrets.MONAD_RPC_URL != '' && secrets.MONAD_RPC_URL || 'https://rpc.monad.xyz' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
        working-directory: app
      - uses: foundry-rs/foundry-toolchain@v1
      - name: Run the non-looping Arbitrum fork suite
        run: forge test --fork-url "$OPENPENDLE_ARB_RPC_URL" --no-match-path test/LoopingFork.t.sol -vv
        working-directory: fork-tests
      - name: Run the production-compiler looping fixture
        run: npm run test:looping-fork
        working-directory: app
      - name: Run the Ethereum production-compiler looping fixture
        run: npm run test:looping-fork:ethereum
        working-directory: app
      - name: Run the Monad production-compiler looping fixture
        run: npm run test:looping-fork:monad
        working-directory: app
      - name: Run the Ethereum Mint production-compiler fixture
        run: npm run test:looping-fork:mint:ethereum
        working-directory: app
      - name: Run the Monad Mint production-compiler fixture
        run: npm run test:looping-fork:mint:monad
        working-directory: app
      - name: Run the Arbitrum Mint production-compiler fixture
        run: npm run test:looping-fork:mint:arbitrum
        working-directory: app
