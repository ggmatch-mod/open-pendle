[profile.default]
src = "src"
test = "test"
out = "out"
libs = ["lib"]
solc = "0.8.26"
# Pendle Router V4 facets use transient storage (EIP-1153) — non-Cancun forks
# fail with EvmError: NotActivated (PLAN.md §3.1).
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = true
remappings = ["forge-std/=lib/forge-std/src/"]

[fuzz]
runs = 16
